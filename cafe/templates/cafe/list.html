{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カフェ一覧</title>

    <link rel="stylesheet" href="{% static 'css/cafe_list.css' %}">
</head>

<body>
<h1>カフェ一覧</h1>

<form method="get" class="search-form">

  <input type="text" name="q" placeholder="店名で検索" value="{{ q|default:'' }}">

  <select name="tag">
    <option value="">タグで絞り込み</option>
    {% for t in tags %}
      <option value="{{ t.id }}" {% if selected_tag == t.id|stringformat:"s" %}selected{% endif %}>
        {{ t.name }}
      </option>
    {% endfor %}
  </select>

  <input type="text" name="place" placeholder="場所（駅名・地名）" value="{{ place|default:'' }}">

  <button type="submit">検索</button>
</form>

<p class="total-count">総件数：{{ total_count }}件</p>

<!-- ★ ここから「もっと見る」対応 ★ -->
<div id="cafe-list" class="cafe-list">
    {% include 'cafe/_cafe_cards.html' %}
</div>

{% if has_more %}
  <button id="load-more" data-page="{{ page }}">もっと見る</button>
{% endif %}
<!-- ★ ここまで追加 ★ -->

<script>
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('load-more');
  if (!btn) return;

  btn.addEventListener('click', () => {
    const page = parseInt(btn.dataset.page) + 1;

    fetch(`?page=${page}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(res => res.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newCards = doc.querySelectorAll('.cafe-card');

      newCards.forEach(card => {
        document.querySelector('#cafe-list').appendChild(card);
      });

      if (newCards.length < 20) {
        btn.remove();
      } else {
        btn.dataset.page = page;
      }
    });
  });
});
</script>

</body>
</html>
